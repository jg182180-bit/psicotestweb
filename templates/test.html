<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Evaluación Psicológica</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="main-card">

        <h1 class="titulo text-center">
            🧠 Evaluación de Bienestar Emocional
        </h1>

        <p class="descripcion text-center">
            Responde cada pregunta según cómo te has sentido recientemente.
        </p>

        <form action="/resultado" method="POST">

            <!-- DATOS OCULTOS -->
            <input type="hidden" name="nombre" value="{{ nombre }}">
            <input type="hidden" name="edad" value="{{ edad }}">
            <input type="hidden" name="telefono" value="{{ telefono }}">

            <input type="hidden" name="ciudad" value="{{ ciudad }}">
            <input type="hidden" name="barrio" value="{{ barrio }}">

            <input type="hidden" name="direccion" value="{{ direccion }}">
            <input type="hidden" name="ocupacion" value="{{ ocupacion }}">

            <h3 class="subtitulo">
                🧩 Preguntas
            </h3>

            <!-- P1 -->
            <div class="pregunta">

                <label>
                    1. Me siento bajo presión durante el día.
                </label>

                <select class="form-select" name="p1" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P2 -->
            <div class="pregunta">

                <label>
                    2. Tengo dificultades para relajarme.
                </label>

                <select class="form-select" name="p2" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P3 -->
            <div class="pregunta">

                <label>
                    3. Siento agotamiento físico o mental.
                </label>

                <select class="form-select" name="p3" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P4 -->
            <div class="pregunta">

                <label>
                    4. Me preocupo excesivamente por diferentes situaciones.
                </label>

                <select class="form-select" name="p4" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P5 -->
            <div class="pregunta">

                <label>
                    5. Me cuesta controlar pensamientos negativos.
                </label>

                <select class="form-select" name="p5" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P6 -->
            <div class="pregunta">

                <label>
                    6. Siento nerviosismo sin razón aparente.
                </label>

                <select class="form-select" name="p6" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P7 -->
            <div class="pregunta">

                <label>
                    7. Me siento satisfecho conmigo mismo.
                </label>

                <select class="form-select" name="p7" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P8 -->
            <div class="pregunta">

                <label>
                    8. Reconozco mis capacidades y fortalezas.
                </label>

                <select class="form-select" name="p8" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P9 -->
            <div class="pregunta">

                <label>
                    9. Confío en mis decisiones personales.
                </label>

                <select class="form-select" name="p9" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P10 -->
            <div class="pregunta">

                <label>
                    10. Disfruto las actividades que realizo diariamente.
                </label>

                <select class="form-select" name="p10" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P11 -->
            <div class="pregunta">

                <label>
                    11. Mantengo relaciones saludables con otras personas.
                </label>

                <select class="form-select" name="p11" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- P12 -->
            <div class="pregunta">

                <label>
                    12. Siento motivación para alcanzar mis metas.
                </label>

                <select class="form-select" name="p12" required>

                    <option value="" selected disabled>
                        Seleccione una opción
                    </option>

                    <option value="0">Nunca</option>
                    <option value="1">A veces</option>
                    <option value="2">Frecuentemente</option>
                    <option value="3">Siempre</option>

                </select>

            </div>

            <!-- OBSERVACIÓN -->
            <div class="mt-5">

                <label class="form-label">

                    📝 ¿Desea agregar alguna situación,
                    pensamiento o comentario adicional?

                </label>

                <textarea
                    class="form-control"
                    name="observacion"
                    rows="5"
                    placeholder="Escriba aquí si desea agregar información adicional..."
                ></textarea>

            </div>

            <!-- BOTÓN -->
            <div class="text-center mt-5">

                <button
                    type="submit"
                    class="btn btn-primary boton"
                >
                    📊 Obtener resultado
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
