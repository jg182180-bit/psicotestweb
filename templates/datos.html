<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Datos Personales</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="main-card">

        <h1 class="titulo text-center">
            👤 Información Personal
        </h1>

        <p class="descripcion text-center">
            Complete la siguiente información
            antes de iniciar la evaluación psicológica.
        </p>

        <form action="/test" method="POST">

            <!-- NOMBRE -->
            <div class="mb-3">

                <label class="form-label">
                    Nombre completo
                </label>

                <input
                    type="text"
                    name="nombre"
                    class="form-control"
                    required
                >

            </div>

            <!-- EDAD -->
            <div class="mb-3">

                <label class="form-label">
                    Edad
                </label>

                <input
                    type="number"
                    name="edad"
                    class="form-control"
                    required
                >

            </div>

            <!-- TELÉFONO -->
            <div class="mb-3">

                <label class="form-label">
                    Número de contacto
                </label>

                <input
                    type="text"
                    name="telefono"
                    class="form-control"
                    required
                >

            </div>

            <!-- CIUDAD -->
            <div class="mb-3">

                <label class="form-label">
                    Ciudad
                </label>

                <input
                    type="text"
                    name="ciudad"
                    class="form-control"
                    required
                >

            </div>

            <!-- BARRIO -->
            <div class="mb-3">

                <label class="form-label">
                    Barrio
                </label>

                <input
                    type="text"
                    name="barrio"
                    class="form-control"
                    required
                >

            </div>

            <!-- DIRECCIÓN -->
            <div class="mb-3">

                <label class="form-label">
                    Dirección
                </label>

                <input
                    type="text"
                    name="direccion"
                    class="form-control"
                    required
                >

            </div>

            <!-- OCUPACIÓN -->
            <div class="mb-4">

                <label class="form-label">
                    Ocupación
                </label>

                <input
                    type="text"
                    name="ocupacion"
                    class="form-control"
                    required
                >

            </div>

            <!-- BOTÓN -->
            <div class="text-center">

                <button
                    type="submit"
                    class="btn btn-primary boton"
                >
                    🚀 Continuar evaluación
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
